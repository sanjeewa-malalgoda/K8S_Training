apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mi-carbonapps-pvc
  namespace: minikube-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: mi-capp-loader
  namespace: minikube-demo
  labels:
    app: mi-capp-loader
    lab: wso2-mi-capp
spec:
  restartPolicy: Always
  containers:
    - name: loader
      image: busybox:1.36
      command:
        - sh
        - -c
        - sleep 365d
      volumeMounts:
        - name: carbonapps
          mountPath: /carbonapps
  volumes:
    - name: carbonapps
      persistentVolumeClaim:
        claimName: mi-carbonapps-pvc
