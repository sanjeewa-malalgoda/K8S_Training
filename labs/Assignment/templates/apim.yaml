{{- if .Values.apim.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-apim
  namespace: {{ .Values.apim.namespace }}
  labels:
    app.kubernetes.io/component: apim
    {{- include "assignment.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: apim
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: apim
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: apim
          image: {{ .Values.apim.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: management
              containerPort: 9443
            - name: gateway
              containerPort: 8243
            - name: http-gateway
              containerPort: 8280
          resources:
            {{- toYaml .Values.apim.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: management
            initialDelaySeconds: 240
            periodSeconds: 15
            failureThreshold: 40
          livenessProbe:
            tcpSocket:
              port: management
            initialDelaySeconds: 360
            periodSeconds: 20
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.apim.serviceName }}
  namespace: {{ .Values.apim.namespace }}
  labels:
    app.kubernetes.io/component: apim
    {{- include "assignment.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: apim
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: management
      port: 9443
      targetPort: management
    - name: gateway
      port: 8243
      targetPort: gateway
    - name: http-gateway
      port: 8280
      targetPort: http-gateway
{{- end }}
