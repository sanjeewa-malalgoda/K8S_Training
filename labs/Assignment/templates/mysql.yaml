apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: assignment-mysql-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "assignment.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.mysql.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-mysql
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: mysql
    {{- include "assignment.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mysql
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mysql
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: mysql
          image: {{ .Values.mysql.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          envFrom:
            - secretRef:
                name: assignment-mysql-secret
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: assignment-mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: assignment-mysql
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: mysql
    {{- include "assignment.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: mysql
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
---
apiVersion: batch/v1
kind: Job
metadata:
  name: assignment-mysql-seed
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: mysql-seed
    {{- include "assignment.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mysql-seed
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: {{ .Values.mysql.image | quote }}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: assignment-mysql-secret
          command:
            - sh
            - -c
            - |
              until mysqladmin ping -h assignment-mysql -uroot -p"$MYSQL_ROOT_PASSWORD" --silent; do
                echo "Waiting for MySQL..."
                sleep 5
              done
              mysql -h assignment-mysql -uroot -p"$MYSQL_ROOT_PASSWORD" < /schema/schema.sql
              mysql -h assignment-mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SELECT COUNT(*) AS applications FROM gov_services.service_application;"
          volumeMounts:
            - name: schema
              mountPath: /schema
      volumes:
        - name: schema
          configMap:
            name: assignment-mysql-schema
