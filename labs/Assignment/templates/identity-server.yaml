{{- if .Values.identityServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-is
  namespace: {{ .Values.identityServer.namespace }}
  labels:
    app.kubernetes.io/component: identity-server
    {{- include "assignment.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: identity-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: identity-server
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: identity-server
          image: {{ .Values.identityServer.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 9443
          resources:
            {{- toYaml .Values.identityServer.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 180
            periodSeconds: 15
            failureThreshold: 40
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 300
            periodSeconds: 20
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.identityServer.serviceName }}
  namespace: {{ .Values.identityServer.namespace }}
  labels:
    app.kubernetes.io/component: identity-server
    {{- include "assignment.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: identity-server
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: https
      port: 9443
      targetPort: https
{{- end }}
