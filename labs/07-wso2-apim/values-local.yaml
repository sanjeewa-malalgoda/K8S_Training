# values-local.yaml
# Minikube training override for WSO2 APIM 4.6.0 All-in-One chart
# Matches schema of all-in-one-4.6.0-2

wso2:
  apim:
    configurations:
      gateway:
        environments:
          - name: "Default"
            type: "hybrid"
            gatewayType: "Regular"
            provider: "wso2"
            visibility:
            displayInApiConsole: true
            description: "This is a hybrid gateway that handles both production and sandbox token traffic."
            showAsTokenEndpointUrl: true
            serviceName: "wso2am-gateway-service"
            servicePort: 9443
            wsHostname: "websocket.wso2.com"
            httpHostname: "gw.wso2.com:8243"
            websubHostname: "websub.wso2.com"

  # APIM configuration (uses public Docker Hub OSS image)
  deployment:
    highAvailability: false

    image:
      imagePullSecrets:
        enabled: false
        username: ""
        password: ""
      registry: "docker.io"
      repository: "wso2/wso2am"
      digest: "sha256:cd69005240af25042e8cd6eccce8fbe9341732bc887b919395c7aaddb43f8d53"
      imagePullPolicy: IfNotPresent

    resources:
      requests:
        memory: "2Gi"
        cpu: "1000m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
      jvm:
        memory:
          xms: "2048m"
          xmx: "2048m"

    startupProbe:
      initialDelaySeconds: 180
      periodSeconds: 10
      failureThreshold: 120

    readinessProbe:
      initialDelaySeconds: 180
      periodSeconds: 10
      failureThreshold: 60

    livenessProbe:
      initialDelaySeconds: 300
      periodSeconds: 10
      failureThreshold: 12

# Kubernetes ingress configuration
kubernetes:
  openshift:
    enabled: false

  ingressClass: "nginx"
  ingress:
    tlsSecret: ""
    ratelimit:
      enabled: false
    management:
      enabled: true
      hostname: "am.wso2.com"
      annotations:
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/affinity: "cookie"
        nginx.ingress.kubernetes.io/session-cookie-name: "route"
        nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
    gateway:
      enabled: true
      hostname: "gw.wso2.com"
      annotations:
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/proxy-buffering: "on"
        nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
    websocket:
      enabled: true
      hostname: "websocket.wso2.com"
    websub:
      enabled: true
      hostname: "websub.wso2.com"
